version: '3.8'

services:
  qwen-tts:
    build: .
    container_name: qwen-tts-lab
    shm_size: 8gb
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      - TRANSFORMERS_CACHE=/app/cache
    ports:
      - "48000:48000"
    volumes:
      - "qwen_cache:/app/cache"
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
      - render

volumes:
  qwen_cache: